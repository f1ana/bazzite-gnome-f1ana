---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: bazzite-gnome-f1ana
description: Personal Bazzite GNOME image with native dev tools and browsers.

# base image to build on top of
base-image: ghcr.io/ublue-os/bazzite-gnome
image-version: stable-43 # latest is also supported

# WARNING: Do not use RPM Fusion repos in this recipe. Bazzite's base image uses
# negativo17 for multimedia and graphics packages (since Oct 2024), and RPM Fusion
# is incompatible — they ship conflicting versions of ffmpeg, gstreamer, mesa, etc.
# Enabling RPM Fusion will cause dependency resolution failures and broken updates.
# See: https://github.com/ublue-os/main/pull/636
#      https://github.com/ublue-os/main/issues/650

modules:
  - type: rpm-ostree
    remove:
      - libobs_vkcapture
      - libobs_glcapture
      - obs-vkcapture-common

  - type: rpm-ostree
    repos:
      - vscode.repo
    install:
      - code

  - type: rpm-ostree
    repos:
      - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
    keys:
      - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
    install:
      - brave-browser

  - type: rpm-ostree
    repos:
      - google-chrome.repo
    install:
      - google-chrome-stable
      - obs-studio
      - obs-studio-plugin-vkcapture
      - https://release.gitkraken.com/linux/gitkraken-amd64.rpm
      - https://github.com/nekename/OpenDeck/releases/latest/download/opendeck-2.10.0-1.x86_64.rpm

  - type: script
    scripts:
      - install-obs-pipewire-audio.sh

  - type: files
    files:
      - source: system
        destination: /

  - type: signing
